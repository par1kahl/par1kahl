name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: par1kahl
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#2d5016&color_dots=#ebedf0,#c4a882,#a0845c,#6b8e3c,#2c5282
            dist/github-contribution-grid-snake-dark.svg?color_snake=#8cc63f&color_dots=#1a1e2e,#c4a882,#a0845c,#6b8e3c,#4a7ab5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          force_orphan: true
