    @keyframes v1{0%,2%{opacity:0}3%{opacity:1}24%{opacity:1}25%{opacity:0}100%{opacity:0}}
    @keyframes v2{0%,27%{opacity:0}28%{opacity:1}49%{opacity:1}50%{opacity:0}100%{opacity:0}}
