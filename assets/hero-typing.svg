<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 45" width="480" height="45">
  <defs>
    <linearGradient id="pG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C3E6B"/>
      <stop offset="50%" stop-color="#4A8A7A"/>
      <stop offset="100%" stop-color="#9B7D55"/>
    </linearGradient>
    <linearGradient id="kG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030104"/>
      <stop offset="50%" stop-color="#993D00"/>
      <stop offset="100%" stop-color="#B34700"/>
    </linearGradient>

    <clipPath id="c1"><rect y="0" height="45" width="0"><animate attributeName="width" values="0;0;480;480;0;0" keyTimes="0;0.03;0.18;0.23;0.25;1" dur="16s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="c2"><rect y="0" height="45" width="0"><animate attributeName="width" values="0;0;480;480;0;0" keyTimes="0;0.28;0.43;0.48;0.50;1" dur="16s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="c3"><rect y="0" height="45" width="0"><animate attributeName="width" values="0;0;480;480;0;0" keyTimes="0;0.53;0.68;0.73;0.75;1" dur="16s" repeatCount="indefinite"/></rect></clipPath>
    <clipPath id="c4"><rect y="0" height="45" width="0"><animate attributeName="width" values="0;0;480;480;0" keyTimes="0;0.78;0.93;0.98;1" dur="16s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <style>
    text{font-family:'Fira Code','SF Mono','Consolas',monospace;font-size:17px}
    @keyframes v1{0%,2%{opacity:0}3%{opacity:1}24%{opacity:1}25%{opacity:0}100%{opacity:0}}
    @keyframes v2{0%,27%{opacity:0}28%{opacity:1}49%{opacity:1}50%{opacity:0}100%{opacity:0}}
    @keyframes v3{0%,52%{opacity:0}53%{opacity:1}74%{opacity:1}75%{opacity:0}100%{opacity:0}}
    @keyframes v4{0%,77%{opacity:0}78%{opacity:1}99%{opacity:1}100%{opacity:0}}
    .v1{animation:v1 16s infinite}
    .v2{animation:v2 16s infinite}
    .v3{animation:v3 16s infinite}
    .v4{animation:v4 16s infinite}
  </style>

  <!-- 1: [P] founder @ phavella -->
  <g clip-path="url(#c1)">
    <!-- Phavella blob -->
    <g class="v1" transform="translate(108,4) scale(0.07)">
      <path d="M205 16C310-2 420 30 476 130C510 220 508 350 450 430C390 502 270 510 170 476C70 440 10 330 16 225C22 120 100 34 205 16Z" fill="url(#pG)"/>
      <line x1="200" y1="100" x2="280" y2="420" stroke="#F8F7F4" stroke-width="42" stroke-linecap="round"/>
      <path d="M220 170C270 100 400 140 390 260C382 350 290 380 270 330" stroke="#F8F7F4" stroke-width="42" stroke-linecap="round" fill="none"/>
    </g>
    <text x="150" y="28" fill="#1B3A5C" class="v1">founder @ phavella</text>
  </g>

  <!-- 2: [K] creator of kronus -->
  <g clip-path="url(#c2)">
    <!-- Kronus tile: white rounded rect + web lines -->
    <g class="v2" transform="translate(107,3) scale(0.072)">
      <rect x="20" y="15" width="500" height="500" rx="12" fill="#f8f7f5" transform="rotate(3,270,265)"/>
      <rect x="20" y="15" width="500" height="500" rx="12" fill="none" stroke="#ccc" stroke-width="1.5" transform="rotate(3,270,265)"/>
      <!-- Web structure: outer hex + inner hex + spokes -->
      <g transform="translate(70,55) scale(0.72)" fill="none" stroke="url(#kG)" stroke-width="16" stroke-linecap="round">
        <polygon points="256,40 450,155 450,365 256,480 62,365 62,155"/>
        <polygon points="256,150 355,205 355,315 256,370 157,315 157,205"/>
        <line x1="256" y1="40" x2="256" y2="150"/>
        <line x1="256" y1="370" x2="256" y2="480"/>
        <line x1="62" y1="155" x2="157" y2="205"/>
        <line x1="355" y1="315" x2="450" y2="365"/>
        <line x1="450" y1="155" x2="355" y2="205"/>
        <line x1="157" y1="315" x2="62" y2="365"/>
      </g>
    </g>
    <text x="150" y="28" fill="#8B6848" class="v2">creator of kronus</text>
  </g>

  <!-- 3: senior AI engineer -->
  <g clip-path="url(#c3)">
    <text x="150" y="28" fill="#556B2F" class="v3">senior AI engineer</text>
  </g>

  <!-- 4: building AI that runs your business -->
  <g clip-path="url(#c4)">
    <text x="62" y="28" fill="#1B3A5C" class="v4">building AI that runs your business</text>
  </g>
</svg>
