    <clipPath id="c4"><rect y="0" height="45" width="0"><animate attributeName="width" values="0;0;480;480;0" keyTimes="0;0.78;0.93;0.98;1" dur="16s" repeatCount="indefinite"/></rect></clipPath>
  </defs>

  <style>
