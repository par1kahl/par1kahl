    @keyframes v4{0%,77%{opacity:0}78%{opacity:1}99%{opacity:1}100%{opacity:0}}
    .v1{animation:v1 16s infinite}
    .v2{animation:v2 16s infinite}
    .v3{animation:v3 16s infinite}
    .v4{animation:v4 16s infinite}
  </style>

