<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 50" width="600" height="50">
  <style>
    @keyframes colorCycle {
      0%, 100% { fill: #1B3A5C; }
      33% { fill: #8B6848; }
      66% { fill: #556B2F; }
    }
    @keyframes show1 {
      0%, 23% { opacity: 1; }
      25%, 100% { opacity: 0; }
    }
    @keyframes show2 {
      0%, 24% { opacity: 0; }
      25%, 48% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes show3 {
      0%, 49% { opacity: 0; }
      50%, 73% { opacity: 1; }
      75%, 100% { opacity: 0; }
    }
    @keyframes show4 {
      0%, 74% { opacity: 0; }
      75%, 98% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes cursor {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .line1 { animation: show1 12s infinite, colorCycle 12s infinite; }
    .line2 { animation: show2 12s infinite, colorCycle 12s infinite; animation-delay: 0s, 3s; }
    .line3 { animation: show3 12s infinite, colorCycle 12s infinite; animation-delay: 0s, 6s; }
    .line4 { animation: show4 12s infinite, colorCycle 12s infinite; animation-delay: 0s, 9s; }
    .cursor { animation: cursor 0.7s step-end infinite; fill: #1B3A5C; }
    text { font-family: 'Fira Code', 'Consolas', 'Monaco', monospace; font-size: 18px; }
  </style>

  <!-- Line 1: founder @ phavella with logo -->
  <g class="line1">
    <!-- Phavella blob logo (simplified) -->
    <g transform="translate(120, 5) scale(0.07)">
      <defs>
        <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#2C3E6B"/>
          <stop offset="50%" stop-color="#4A8A7A"/>
          <stop offset="100%" stop-color="#9B7D55"/>
        </linearGradient>
      </defs>
      <path d="M205 16C310-2 420 30 476 130C510 220 508 350 450 430C390 502 270 510 170 476C70 440 10 330 16 225C22 120 100 34 205 16Z" fill="url(#pg)"/>
      <line x1="176" y1="48" x2="304" y2="464" stroke="#F8F7F4" stroke-width="35" stroke-linecap="round" stroke-opacity="0.95"/>
      <path d="M200 136C256 64 416 112 408 248C400 368 272 408 248 344" stroke="#F8F7F4" stroke-width="35" stroke-linecap="round" stroke-opacity="0.95" fill="none"/>
    </g>
    <text x="165" y="33">founder @ phavella</text>
  </g>

  <!-- Line 2: creator of kronus with logo -->
  <g class="line2">
    <!-- Kronus web logo (simplified) -->
    <g transform="translate(122, 7) scale(0.065)">
      <defs>
        <radialGradient id="kg" cx="290" cy="286" r="240" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#030104"/>
          <stop offset="45%" stop-color="#993D00"/>
          <stop offset="100%" stop-color="#B34700" stop-opacity="0.5"/>
        </radialGradient>
      </defs>
      <circle cx="280" cy="280" r="240" fill="#f8f7f5"/>
      <path fill="url(#kg)" transform="scale(0.85) translate(40,40)" d="M429.983,349.78V164.817l20.07-11.563l-7.824-13.581l-19.889,11.457L263.844,59.894V0H248.17v59.292L91.386,149.545l-20.265-11.984l-7.979,13.491l17.844,10.551v186.182l-50.714,29.216l7.824,13.581l51.055-29.413l159.019,91.539v22.72h15.673v-23.322l156.269-89.955l52.26,30.904l7.978-13.491L429.983,349.78z"/>
    </g>
    <text x="165" y="33">creator of kronus</text>
  </g>

  <!-- Line 3: senior AI engineer (no logo) -->
  <g class="line3">
    <text x="190" y="33">senior AI engineer</text>
  </g>

  <!-- Line 4: building AI that runs your business (no logo) -->
  <g class="line4">
    <text x="115" y="33">building AI that runs your business</text>
  </g>

  <!-- Blinking cursor -->
  <rect class="cursor" x="480" y="14" width="2" height="24" rx="1"/>
</svg>
